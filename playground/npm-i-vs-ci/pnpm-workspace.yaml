# 이 파일은 "격리" 목적입니다.
#
# 저장소 루트의 pnpm-workspace.yaml 은 `playground/*` 를 workspace 패키지로
# 포함합니다. 그러면 이 디렉토리도 pnpm workspace 의 일부로 끌려가서,
# 순수하게 npm 으로 진행하려는 이 실험과 충돌할 수 있습니다.
#
# pnpm 은 가장 가까운(=하위) pnpm-workspace.yaml 을 workspace 루트로 인식합니다.
# 따라서 여기에 packages 가 빈 workspace 파일을 두면, 이 디렉토리는 루트
# workspace 로부터 분리되어 npm 실험을 안전하게 격리할 수 있습니다.
#
# 정리: 이 안에서는 pnpm 을 쓰지 않습니다. 오직 npm 만 사용합니다.
packages: []
